services:
  rocket-aiflow-docs:
    container_name: rocket-aiflow-docs
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      TZ: UTC
    restart: unless-stopped
