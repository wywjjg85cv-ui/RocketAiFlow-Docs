name: Docker Release to ECR

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish (example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate required repository variables
        shell: bash
        run: |
          test -n "${AWS_REGION}" || { echo "Missing repository variable: AWS_REGION"; exit 1; }
          test -n "${ECR_REPOSITORY}" || { echo "Missing repository variable: ECR_REPOSITORY"; exit 1; }
          test -n "${AWS_ROLE_TO_ASSUME}" || { echo "Missing repository variable: AWS_ROLE_TO_ASSUME"; exit 1; }
          test -n "${NEXT_PUBLIC_GA_MEASUREMENT_ID}" || { echo "Missing repository variable: NEXT_PUBLIC_GA_MEASUREMENT_ID"; exit 1; }

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ inputs.image_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "Release tag cannot be empty."
            exit 1
          fi

          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.release.outputs.tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          build-args: |
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ env.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.release.outputs.tag }}
